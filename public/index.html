<!doctype html><html><head><meta charset="utf-8"><title>Key Panel</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui;background:#0b0f17;color:#e6e9ef;margin:0;padding:24px;max-width:1200px;margin:0 auto}
h1{margin:0 0 8px;font-size:22px}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.card{background:#131826;padding:20px;border-radius:10px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #232a3a}
th{font-size:11px;text-transform:uppercase;color:#8a92a3;letter-spacing:.05em}
code{background:#0b0f17;padding:2px 6px;border-radius:4px;font-size:12px}
button,input,select{padding:8px 10px;background:#0b0f17;border:1px solid #232a3a;color:#e6e9ef;border-radius:6px;font-size:13px}
button{cursor:pointer;background:#4f7cff;border-color:#4f7cff;font-weight:600}
button.gh{background:transparent;color:#e6e9ef}
button.danger{background:#ff4b5c;border-color:#ff4b5c}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
.row>div{display:flex;flex-direction:column;gap:4px}
.muted{color:#8a92a3;font-size:12px}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.ok{background:#1f3d2a;color:#7ee2a8}
.off{background:#3d1f1f;color:#ff8a8a}
.exp{background:#3d2f1f;color:#ffb87e}
.new-keys{background:#0b0f17;padding:12px;border-radius:6px;margin-top:12px;max-height:200px;overflow:auto}
.new-keys div{font-family:monospace;font-size:13px;padding:2px 0}
</style></head><body>
<div class="bar">
  <div><h1>License Key Panel</h1><div class="muted">Manage your protected app's keys</div></div>
  <form method="post" action="/logout"><button class="gh">Logout</button></form>
</div>

<div class="card">
  <h3 style="margin:0 0 12px">Generate keys</h3>
  <div class="row">
    <div><label class="muted">Duration (days)</label><input id="dur" type="number" value="30" min="1"></div>
    <div><label class="muted">Device limit</label><input id="lim" type="number" value="1" min="1"></div>
    <div><label class="muted">Count</label><input id="cnt" type="number" value="1" min="1" max="100"></div>
    <div style="flex:1"><label class="muted">Note (optional)</label><input id="note" placeholder="customer@email"></div>
    <button onclick="gen()">Generate</button>
  </div>
  <div class="new-keys" id="newkeys" style="display:none"></div>
</div>

<div class="card">
  <h3 style="margin:0 0 12px">Keys</h3>
  <table id="tbl"><thead><tr>
    <th>Key</th><th>Status</th><th>Duration</th><th>Devices</th><th>Expires</th><th>Note</th><th></th>
  </tr></thead><tbody></tbody></table>
</div>

<script>
async function load(){
  const r=await fetch('/admin/api/keys').then(r=>r.json());
  const tb=document.querySelector('#tbl tbody');tb.innerHTML='';
  const now=Date.now();
  for(const k of r.keys){
    const expired=k.expires_at && now>k.expires_at;
    const status=!k.is_active?'<span class="pill off">revoked</span>':expired?'<span class="pill exp">expired</span>':'<span class="pill ok">active</span>';
    const exp=k.expires_at?new Date(k.expires_at).toLocaleDateString():'<span class="muted">not activated</span>';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><code>${k.key}</code></td><td>${status}</td><td>${k.duration_days}d</td>
      <td>${k.device_count}/${k.device_limit}</td><td>${exp}</td><td>${k.note||''}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="gh" onclick="toggle(${k.id})">${k.is_active?'Revoke':'Enable'}</button>
        <button class="gh" onclick="reset(${k.id})">Reset HWID</button>
        <button class="danger" onclick="del(${k.id})">Delete</button>
      </td>`;
    tb.appendChild(tr);
  }
}
async function gen(){
  const body={duration_days:+dur.value,device_limit:+lim.value,count:+cnt.value,note:note.value};
  const r=await fetch('/admin/api/keys',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  if(r.created){
    const box=document.getElementById('newkeys');
    box.style.display='block';
    box.innerHTML='<div class="muted" style="margin-bottom:6px">Newly generated — copy now:</div>'+r.created.map(k=>`<div>${k}</div>`).join('');
    load();
  }
}
async function toggle(id){await fetch('/admin/api/keys/'+id+'/toggle',{method:'POST'});load();}
async function reset(id){if(confirm('Unbind all devices from this key?')){await fetch('/admin/api/keys/'+id+'/reset-devices',{method:'POST'});load();}}
async function del(id){if(confirm('Delete this key permanently?')){await fetch('/admin/api/keys/'+id,{method:'DELETE'});load();}}
load();setInterval(load,15000);
</script>
</body></html>
